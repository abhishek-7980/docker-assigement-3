<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Green Corner | Your Local Garden Shop</title>
    <style>
        body { font-family: sans-serif; margin: 0; color: #333; }
        header { background: #2d5a27; color: white; padding: 1rem; text-align: center; }
        nav { background: #f4f4f4; padding: 0.5rem; text-align: center; }
        nav a { margin: 0 15px; text-decoration: none; color: #2d5a27; font-weight: bold; }
        .container { max-width: 1000px; margin: 2rem auto; padding: 0 20px; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .product-card { border: 1px solid #ddd; padding: 15px; text-align: center; }
        .price { font-weight: bold; color: #2d5a27; }
        footer { background: #333; color: white; text-align: center; padding: 1rem; }
    </style>
</head>
<body>
    <header><h1>The Green Corner</h1></header>
    <nav><a href="#">Home</a><a href="#">Plants</a></nav>
    <div class="container">
        <section class="product-grid">
            <div class="product-card">
                <h3>Snake Plant</h3>
                <p class="price">$24.99</p>
            </div>
        </section>
    </div>
    <footer><p>&copy; 2026 The Green Corner</p></footer>
</body>
</html>
